### model
model_name_or_path: meta-llama/Meta-Llama-3-8B-Instruct  # 指定预训练模型路径，这里使用的是Meta Llama 3 8B指令微调版本
trust_remote_code: true  # 是否信任远程代码，设为true允许加载模型库中的自定义代码

### method
stage: sft  # 训练阶段，sft表示监督微调(Supervised Fine-Tuning)
do_train: true  # 是否执行训练，设为true开启训练模式
finetuning_type: full  # 微调类型，full表示全量参数微调
use_badam: true  # 是否启用BAdam优化器，一种基于块自适应的优化算法
badam_mode: layer  # BAdam模式，layer表示按层进行参数更新
badam_switch_mode: ascending  # BAdam参数切换模式，ascending表示按升序切换
badam_switch_interval: 50  # BAdam参数切换间隔，每50步切换一次
badam_verbose: 2  # BAdam详细程度，控制日志输出级别
# deepspeed: examples/deepspeed/ds_z3_config.json  # DeepSpeed配置文件路径，已注释

### dataset
dataset: identity,alpaca_en_demo  # 数据集名称，使用identity和alpaca_en_demo两个数据集
template: llama3  # 数据模板类型，指定为llama3格式
cutoff_len: 2048  # 输入序列最大长度，超过部分会被截断
max_samples: 1000  # 最大样本数量，限制训练数据量
overwrite_cache: true  # 是否覆盖缓存，设为true重新生成预处理缓存
preprocessing_num_workers: 16  # 预处理并行工作进程数，加速数据预处理
dataloader_num_workers: 4  # 数据加载器工作进程数，加速数据加载

### output
output_dir: saves/llama3-8b/full/sft  # 模型输出目录，保存训练结果
logging_steps: 10  # 日志记录频率，每10步输出一次训练日志
save_steps: 500  # 模型保存频率，每500步保存一次检查点
plot_loss: true  # 是否绘制损失曲线图
overwrite_output_dir: true  # 是否覆盖输出目录，设为true会删除现有输出目录
save_only_model: false  # 是否只保存模型权重，false表示同时保存优化器状态等
report_to: none  # 报告工具，none表示不使用任何外部监控工具，可选wandb、tensorboard等

### train
per_device_train_batch_size: 1  # 每个设备的训练批次大小，设为1减少显存占用
gradient_accumulation_steps: 8  # 梯度累积步数，模拟更大的批次大小
learning_rate: 1.0e-5  # 学习率，较小的学习率适合微调任务
num_train_epochs: 3.0  # 训练轮数，浮点数表示可以设置小数轮
lr_scheduler_type: cosine  # 学习率调度器类型，cosine表示余弦退火调度器
warmup_ratio: 0.1  # 预热比例，前10%的训练步骤用于学习率预热

### eval
# val_size: 0.1  # 验证集比例，已注释，表示不使用验证集
# per_device_eval_batch_size: 1  # 每个设备评估批次大小，已注释
